<script>
const meta = p => document.querySelector('meta[data-prop="' + p + '"]').content;

const DATA_URL   = meta('dataUrl');
const LABEL_COL  = meta('labelCol');
const VALUE_COL  = meta('valueCol');
const BASE_COLOR = meta('baseColor');
const OVER_COLOR = meta('overColor');
const THRESHOLD  = Number(meta('threshold')) || 100;
const COLS       = Math.max(1, Math.round(Number(meta('cols')) || 5));

document.documentElement.style.setProperty('--base-color', BASE_COLOR);
document.documentElement.style.setProperty('--over-color', OVER_COLOR);
document.getElementById('legend-base').style.background = BASE_COLOR;
document.getElementById('legend-over').style.background = OVER_COLOR;

let RAW_DATA = [];

const CFG = {
  COLS:      COLS,
  CELL_W:    138,
  CELL_H:    150,
  CX_OFF:    64,
  CY_OFF:    60,
  R_START:   30,
  R_PER_REV: 7,
  STEPS:     90,
  STROKE_W:  3.4,
  DOT_R:     5.2,
  BASE:      BASE_COLOR,
  OVER:      OVER_COLOR,
  BG:        '#0e0f11',
  MUTED_COL: '#6b7280',
  FONT:      'Syne, sans-serif',
  MONO:      'DM Mono, monospace',
  ANIM_DUR:  0.6,
  ANIM_STAG: 0.04,
};

let currentSort   = 'desc';
let currentFilter = 'all';
let searchQuery   = '';

const rAt = ca => CFG.R_START + (ca / (2*Math.PI)) * CFG.R_PER_REV;
const f2  = n  => Math.round(n * 10) / 10;

function spiralPoints(cx, cy, startCumul, arcAngle) {
  const pts = [];
  for (let s = 0; s <= CFG.STEPS; s++) {
    const t  = s / CFG.STEPS;
    const ca = startCumul + t * arcAngle;
    const a  = -Math.PI/2 + ca;
    const r  = rAt(ca);
    pts.push(f2(cx + r*Math.cos(a)) + ',' + f2(cy + r*Math.sin(a)));
  }
  return pts.join(' ');
}

function polylineLength(cx, cy, startCumul, arcAngle) {
  let len = 0, px, py;
  for (let s = 0; s <= CFG.STEPS; s++) {
    const t  = s / CFG.STEPS;
    const ca = startCumul + t * arcAngle;
    const a  = -Math.PI/2 + ca;
    const r  = rAt(ca);
    const x  = cx + r*Math.cos(a);
    const y  = cy + r*Math.sin(a);
    if (s > 0) len += Math.hypot(x - px, y - py);
    px = x; py = y;
  }
  return Math.ceil(len) + 2;
}

function getDisplayData() {
  let d = [...RAW_DATA];
  if (currentFilter === 'over')  d = d.filter(r => r.pct > THRESHOLD);
  if (currentFilter === 'under') d = d.filter(r => r.pct <= THRESHOLD);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    d = d.filter(r => String(r.name).toLowerCase().includes(q));
  }
  if (currentSort === 'desc')  d.sort((a,b) => b.pct - a.pct);
  if (currentSort === 'asc')   d.sort((a,b) => a.pct - b.pct);
  if (currentSort === 'alpha') d.sort((a,b) => String(a.name).localeCompare(String(b.name)));
  return d;
}

function buildSVG(data) {
  if (!data.length) return null;
  const cols  = Math.min(CFG.COLS, data.length);
  const nRows = Math.ceil(data.length / cols);
  const svgW  = cols * CFG.CELL_W + 20;
  const svgH  = nRows * CFG.CELL_H + 20;

  const parts = ['<svg xmlns="http://www.w3.org/2000/svg" width="' + svgW + '" height="' + svgH + '" font-family="' + CFG.FONT + '">'];
  const styleRules = [];

  data.forEach((d, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx  = col * CFG.CELL_W + CFG.CX_OFF;
    const cy  = row * CFG.CELL_H + CFG.CY_OFF;
    const pct = d.pct;

    const basePct   = Math.min(pct, THRESHOLD);
    const ovfPct    = Math.max(pct - THRESHOLD, 0);
    const baseAngle = (basePct / THRESHOLD) * 2 * Math.PI;
    const ovfAngle  = (ovfPct  / THRESHOLD) * 2 * Math.PI;
    const color     = pct >= THRESHOLD ? CFG.OVER : CFG.BASE;
    const labelY    = cy + CFG.R_START + CFG.R_PER_REV + 14;
    const delay     = (i * CFG.ANIM_STAG).toFixed(2);
    const cellId    = 'cell-' + i;
    const cellX     = col * CFG.CELL_W;
    const cellY     = row * CFG.CELL_H;

    parts.push('<g class="arc-cell" data-name="' + d.name + '" data-pct="' + pct + '" data-idx="' + i + '">');
    parts.push('<rect class="arc-bg" x="' + (cellX+4) + '" y="' + (cellY+4) + '" width="' + (CFG.CELL_W-8) + '" height="' + (CFG.CELL_H-8) + '" rx="10" fill="white" fill-opacity="0.04"/>');

    if (basePct > 0) {
      const pts = spiralPoints(cx, cy, 0, baseAngle);
      const len = polylineLength(cx, cy, 0, baseAngle);
      const pid = cellId + '-base';
      styleRules.push('#' + pid + '{stroke-dasharray:' + len + ';stroke-dashoffset:' + len + ';animation:draw ' + CFG.ANIM_DUR + 's ' + delay + 's ease-out forwards}');
      parts.push('<polyline id="' + pid + '" points="' + pts + '" fill="none" stroke="' + CFG.BASE + '" stroke-width="' + CFG.STROKE_W + '" stroke-linecap="round" stroke-linejoin="round"/>');
    }

    if (ovfPct > 0) {
      const pts = spiralPoints(cx, cy, 2*Math.PI, ovfAngle);
      const len = polylineLength(cx, cy, 2*Math.PI, ovfAngle);
      const pid = cellId + '-over';
      const ovDelay = (i * CFG.ANIM_STAG + CFG.ANIM_DUR).toFixed(2);
      styleRules.push('#' + pid + '{stroke-dasharray:' + len + ';stroke-dashoffset:' + len + ';animation:draw ' + (CFG.ANIM_DUR * 0.6) + 's ' + ovDelay + 's ease-out forwards}');
      parts.push('<polyline id="' + pid + '" points="' + pts + '" fill="none" stroke="' + CFG.OVER + '" stroke-width="' + CFG.STROKE_W + '" stroke-linecap="round" stroke-linejoin="round"/>');
    }

    if (pct > 0) {
      const tipCa = ovfPct > 0 ? 2*Math.PI + ovfAngle : baseAngle;
      const tipA  = -Math.PI/2 + tipCa;
      const tipR  = rAt(tipCa);
      const dx    = f2(cx + tipR * Math.cos(tipA));
      const dy    = f2(cy + tipR * Math.sin(tipA));
      const dotDelay = ovfPct > 0
        ? (i * CFG.ANIM_STAG + CFG.ANIM_DUR + CFG.ANIM_DUR * 0.6).toFixed(2)
        : (i * CFG.ANIM_STAG + CFG.ANIM_DUR).toFixed(2);
      const did = cellId + '-dot';
      styleRules.push('#' + did + '{opacity:0;animation:fade 0.2s ' + dotDelay + 's ease-out forwards}');
      parts.push('<circle id="' + did + '" cx="' + dx + '" cy="' + dy + '" r="' + CFG.DOT_R + '" fill="' + color + '" stroke="' + CFG.BG + '" stroke-width="1.8"/>');
    }

    const pctDelay = (i * CFG.ANIM_STAG + 0.1).toFixed(2);
    const lid = cellId + '-lbl';
    styleRules.push('#' + lid + '{opacity:0;animation:fade 0.3s ' + pctDelay + 's ease-out forwards}');
    parts.push('<text id="' + lid + '" x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="700" fill="' + color + '" dy="-1">' + pct + '%</text>');

    parts.push('<text x="' + cx + '" y="' + labelY + '" text-anchor="middle" dominant-baseline="hanging" font-size="11" font-family="' + CFG.MONO + '" fill="' + CFG.MUTED_COL + '" letter-spacing="0">' + d.name + '</text>');
    parts.push('</g>');
  });

  parts.unshift('<style>@keyframes draw{to{stroke-dashoffset:0}}@keyframes fade{to{opacity:1}}' + styleRules.join('') + '</style>');
  parts.push('</svg>');
  return parts.join('');
}

function render() {
  const data = getDisplayData();
  const container = document.getElementById('chart-svg-container');
  const empty     = document.getElementById('empty-state');

  if (!data.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    container.innerHTML = buildSVG(data);
    attachHoverEvents();
  }
  updateStats(data);
}

function updateStats(data) {
  const total   = RAW_DATA.length;
  const showing = data.length;
  const over    = data.filter(d => d.pct > THRESHOLD).length;
  const avg     = data.length ? Math.round(data.reduce((s,d) => s+d.pct, 0) / data.length) : 0;
  const max     = data.length ? Math.max(...data.map(d => d.pct)) : 0;

  document.getElementById('stats-bar').innerHTML =
    '<div class="stat"><span class="stat-val">' + showing + '<span style="font-size:13px;color:var(--muted)">/' + total + '</span></span><span class="stat-lbl">Showing</span></div>' +
    '<div class="stat"><span class="stat-val over">' + over + '</span><span class="stat-lbl">Over threshold</span></div>' +
    '<div class="stat"><span class="stat-val base">' + avg + '%</span><span class="stat-lbl">Average</span></div>' +
    '<div class="stat"><span class="stat-val">' + max + '%</span><span class="stat-lbl">Peak</span></div>';
}

const tooltip = document.getElementById('tooltip');

function attachHoverEvents() {
  document.querySelectorAll('.arc-cell').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const name = el.dataset.name;
      const pct  = parseFloat(el.dataset.pct);
      const over = Math.max(pct - THRESHOLD, 0);
      const color = pct >= THRESHOLD ? 'over' : 'base';
      tooltip.innerHTML =
        '<div class="tt-name">' + name + '</div>' +
        '<div class="tt-row"><span class="tt-key">Value</span><span class="tt-val ' + color + '">' + pct + '%</span></div>' +
        (over > 0 ? '<div class="tt-row"><span class="tt-key">Overflow</span><span class="tt-val over">+' + over.toFixed(0) + '%</span></div>' : '') +
        '<div class="tt-row"><span class="tt-key">Status</span><span class="tt-val ' + color + '">' + (pct >= THRESHOLD ? 'Over threshold' : 'Within range') + '</span></div>';
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', e => {
      const x = e.clientX + 16, y = e.clientY - 10;
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 16 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 10 : y) + 'px';
    });
    el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
}

document.querySelectorAll('[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;

document.querySelectorAll('[data-filter]').forEach(btn => {

    btn.classList.add('active');

document.getElementById('search').addEventListener('input', e => {

<\/script>

    const SHOW_Y_AXIS     = meta('showYAxis') === 'true';
    const AXIS_LABEL_SIZE = meta('axisLabelSize');
    const DATA_LABEL_SIZE = meta('dataLabelSize');

TEMPLATES.satellite = (document.getElementById('tpl-satellite').textContent || '')

const ta = document.getElementById('code');
const preview = document.getElementById('preview');
const tplSelect = document.getElementById('tpl');
const toast = document.getElementById('toast');

const PROD_BASE = 'https://powerbiferrytales.github.io';

function rewriteForPreview(value) {
  // Swap the production data URL for the current origin so previews work
  // on localhost, raw.githack (test branches), or github.io. Downloaded
  // HTML keeps the production URL so it works anywhere.
  const base = location.origin + location.pathname.replace(/\/[^/]*$/, '');
  if (base === PROD_BASE) return value;
  return value.split(PROD_BASE).join(base);
}

ta.value = TEMPLATES.stat;
preview.srcdoc = rewriteForPreview(TEMPLATES.stat);

let editor = null;
let renderTimer = null;

function render(value) {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    preview.srcdoc = rewriteForPreview(value);
  }, 250);
}

function currentValue() {
  return editor ? editor.getValue() : ta.value;
}

function setValue(v) {
  if (editor) {
    editor.setValue(v);
    editor.clearHistory();
  } else {
    ta.value = v;
  }
  render(v);
}

function loadTemplate(name) {
  setValue(TEMPLATES[name] || TEMPLATES.blank);
}

if (typeof CodeMirror !== 'undefined') {
  editor = CodeMirror.fromTextArea(ta, {
    mode: 'htmlmixed',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: true,
    autoCloseTags: true,
    matchBrackets: true,
    indentUnit: 2,
    tabSize: 2,
  });
  editor.on('change', () => render(editor.getValue()));
} else {
  ta.addEventListener('input', () => render(ta.value));
}

tplSelect.addEventListener('change', () => loadTemplate(tplSelect.value));
document.getElementById('reset').addEventListener('click', () => loadTemplate(tplSelect.value));

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

document.getElementById('copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(currentValue());
    showToast('Copied to clipboard');
  } catch {
    showToast('Copy failed — select + copy manually');
  }
});

document.getElementById('download').addEventListener('click', () => {
  const blob = new Blob([currentValue()], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `infographic-${tplSelect.value}.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded');
});

const divider = document.getElementById('divider');

let dragging = false;

divider.addEventListener('mousedown', () => {

  dragging = true;
  divider.classList.add('dragging');
  document.body.style.userSelect = 'none';
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = split.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  leftPane.style.flex = `0 0 ${Math.max(20, Math.min(80, pct))}%`;
});

const panel = document.getElementById('panel');
const panelBody = document.getElementById('panelBody');

function detectTemplate(html) {
  const m = html.match(/<meta\s+data-template=["']([^"']+)["']/i);
  return m ? m[1] : null;
}

function readFrom(el, field) {
  if (el.tagName === 'META') {
    const v = el.getAttribute('content') || '';
    if (field.type === 'checkbox') return v === 'true';
    if (field.type === 'number') return v === '' ? '' : Number(v);
    return v;
  }
  if (field.target === 'bullets') {
    return [...el.querySelectorAll('li')].map(li => li.textContent).join('\n');
  }
  return el.textContent;
}

function writeTo(el, field, value) {
  if (el.tagName === 'META') {
    const str = field.type === 'checkbox' ? (value ? 'true' : 'false') : String(value);
    el.setAttribute('content', str);
    return;
  }
  if (field.target === 'bullets') {
    const lines = String(value).split('\n').map(s => s.trim()).filter(Boolean);
    el.innerHTML = lines.map(l => '<li>' + escapeHtml(l) + '</li>').join('');
    return;
  }
  el.textContent = String(value);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function parsePanelValues(html, schema) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const values = {};
  for (const f of schema.fields || []) {
    const el = doc.querySelector('[data-prop="' + f.prop + '"]');
    if (el) values[f.prop] = readFrom(el, f);
  }
  values._repeats = {};
  for (const r of schema.repeats || []) {
    const container = doc.querySelector('[data-repeat-container="' + r.key + '"]');
    const items = container ? [...container.querySelectorAll('[data-repeat-item="' + r.key + '"]')] : [];
    values._repeats[r.key] = items.map(item => {
      const iv = {};
      for (const f of r.fields) {
        if (f.target === 'class') {
          iv[f.prop] = item.classList.contains(f.className);
        } else {
          const el = item.querySelector('[data-prop="' + f.prop + '"]');
          iv[f.prop] = el ? readFrom(el, f) : '';
        }
      }
      return iv;
    });
  }
  return values;
}

function applyFieldChange(html, schema, change) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const { field, value, repeatKey, repeatIdx } = change;
  let scope = doc;
  if (repeatKey != null) {
    const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
    const items = container ? [...container.querySelectorAll('[data-repeat-item="' + repeatKey + '"]')] : [];
    scope = items[repeatIdx];
    if (!scope) return html;
  }
  if (field.target === 'class') {
    scope.classList.toggle(field.className, !!value);
  } else {
    const el = scope.querySelector('[data-prop="' + field.prop + '"]');
    if (el) writeTo(el, field, value);
  }
  return serialize(doc);
}

function applyRepeatAdd(html, schema, repeatKey) {
  const r = (schema.repeats || []).find(x => x.key === repeatKey);
  if (!r) return html;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
  if (!container) return html;
  const tpl = document.createElement('template');
  tpl.innerHTML = r.itemTemplate.trim();
  container.appendChild(tpl.content.firstChild);
  return serialize(doc);
}

function applyRepeatRemove(html, schema, repeatKey, idx) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
  if (!container) return html;
  const items = [...container.querySelectorAll('[data-repeat-item="' + repeatKey + '"]')];
  if (items[idx]) items[idx].remove();
  return serialize(doc);
}

function serialize(doc) {
  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

function buildFieldInput(field, value, onInput) {
  const wrap = document.createElement('div');
  wrap.className = 'ig-field' + (field.type === 'checkbox' ? ' inline' : '');

  if (field.type === 'checkbox') {
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = !!value;
    input.addEventListener('change', () => onInput(input.checked));
    wrap.appendChild(input);
    const lbl = document.createElement('span');
    lbl.className = 'ig-field-label';
    lbl.textContent = field.label;
    wrap.appendChild(lbl);
    return wrap;
  }

  const lbl = document.createElement('label');
  lbl.className = 'ig-field-label';
  lbl.textContent = field.label;
  wrap.appendChild(lbl);

  let input;
  if (field.type === 'textarea') {
    input = document.createElement('textarea');
  } else {
    input = document.createElement('input');
    input.type = field.type === 'url' ? 'url' : (field.type === 'color' ? 'color' : (field.type === 'number' ? 'number' : 'text'));
    if (field.type === 'number') {
      if (field.min != null) input.min = field.min;
      if (field.max != null) input.max = field.max;
      if (field.step != null) input.step = field.step;
    }
  }
  input.value = value == null ? '' : String(value);
  input.addEventListener('input', () => onInput(input.value));
  wrap.appendChild(input);
  return wrap;
}

function renderPanel() {
  const html = currentValue();
  const tpl = detectTemplate(html);
  const schema = tpl && SCHEMAS[tpl];

  panelBody.innerHTML = '';

  if (!tpl) {
    const empty = document.createElement('div');
    empty.className = 'ig-empty';
    empty.textContent = 'Custom HTML — no properties available. Pick a template to enable the panel.';
    panelBody.appendChild(empty);
    return;
  }
  if (!schema) {
    const empty = document.createElement('div');
    empty.className = 'ig-empty';
    empty.textContent = 'This template has no editable properties.';
    panelBody.appendChild(empty);
    return;
  }

  const values = parsePanelValues(html, schema);

  for (const f of schema.fields || []) {
    panelBody.appendChild(buildFieldInput(f, values[f.prop], (v) => {
      applyFromPanel(applyFieldChange(currentValue(), schema, { field: f, value: v }));
    }));
  }

  for (const r of schema.repeats || []) {
    const rWrap = document.createElement('div');
    rWrap.className = 'ig-repeat';
    const rLbl = document.createElement('div');
    rLbl.className = 'ig-repeat-label';
    rLbl.textContent = r.label;
    rWrap.appendChild(rLbl);

    const items = values._repeats[r.key] || [];
    items.forEach((iv, idx) => {
      const item = document.createElement('div');
      item.className = 'ig-repeat-item';
      const itemTitle = document.createElement('div');
      itemTitle.className = 'ig-repeat-item-title';
      itemTitle.textContent = r.itemLabel + ' ' + (idx + 1);
      item.appendChild(itemTitle);

      if (items.length > 1) {
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.className = 'ig-repeat-remove';
        rm.innerHTML = '&times;';
        rm.title = 'Remove ' + r.itemLabel.toLowerCase();
        rm.addEventListener('click', () => {
          applyFromPanel(applyRepeatRemove(currentValue(), schema, r.key, idx), { rebuild: true });
        });
        item.appendChild(rm);
      }

      for (const f of r.fields) {
        item.appendChild(buildFieldInput(f, iv[f.prop], (v) => {
          applyFromPanel(applyFieldChange(currentValue(), schema, {
            field: f, value: v, repeatKey: r.key, repeatIdx: idx,
          }));
        }));
      }
      rWrap.appendChild(item);
    });

    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'ig-repeat-add';
    addBtn.textContent = '+ Add ' + r.itemLabel.toLowerCase();
    addBtn.addEventListener('click', () => {
      applyFromPanel(applyRepeatAdd(currentValue(), schema, r.key), { rebuild: true });
    });
    rWrap.appendChild(addBtn);

    panelBody.appendChild(rWrap);
  }
}

let applyingFromPanel = false;

function applyFromPanel(newHtml, opts) {
  applyingFromPanel = true;
  try {
    setValue(newHtml);
    // Only rebuild the panel for structural changes (add/remove rows).
    // Field edits leave focus on the input the user is typing in.
    if (opts && opts.rebuild) renderPanel();
  } finally {
    applyingFromPanel = false;
  }
}

function onEditorContentChanged() {
  if (applyingFromPanel) return;
  renderPanel();
}

// Hook into editor changes (CodeMirror or textarea fallback)
if (editor) {
  editor.on('change', onEditorContentChanged);
} else {
  ta.addEventListener('input', onEditorContentChanged);
}
tplSelect.addEventListener('change', () => {
  // loadTemplate already fired; re-render panel after the fact
  setTimeout(renderPanel, 0);
});

// Collapsible toggle
document.getElementById('togglePanel').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
});

// Initial render
renderPanel();
</script>
