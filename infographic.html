  chart: `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta data-template="chart">
<meta data-prop="dataUrl"  content="https://powerbiferrytales.github.io/data/sales.csv">
<meta data-prop="labelCol" content="month">
<meta data-prop="valueCol" content="revenue">
<meta data-prop="barColor" content="#c9185b">
<title>Bar chart</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"><\/script>
<style>
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #fff;
    margin: 0;
    padding: 48px 40px;
    color: #1e2060;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 1.9rem; margin: 0 0 6px; }
  .sub { color: #7e7e92; margin-bottom: 32px; }
  svg { width: 100%; height: auto; display: block; }
  .bar { fill: var(--bar-color, #c9185b); transition: filter 0.2s; }
  .bar:hover { filter: brightness(1.1); }
  .axis text { font-size: 12px; fill: #7e7e92; }
  .value-label { font-size: 11px; fill: #1e2060; font-weight: 600; }
  .error { color: #991b1b; background: #fee2e2; padding: 12px; border-radius: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1 data-prop="title">Monthly revenue</h1>
    <div class="sub">Loading CSV&hellip;</div>
    <div id="chart"></div>
  </div>
  <script>
    const meta = p => document.querySelector('meta[data-prop="' + p + '"]').content;
    const DATA_URL  = meta('dataUrl');
    const LABEL_COL = meta('labelCol');
    const VALUE_COL = meta('valueCol');
    document.documentElement.style.setProperty('--bar-color', meta('barColor'));

    Papa.parse(DATA_URL, {
      download: true,
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true,
      complete: (res) => {
        const rows = res.data.filter(r => r[LABEL_COL] != null && r[VALUE_COL] != null);
        if (!rows.length) { showError('No data rows found'); return; }
        document.querySelector('.sub').textContent =
          rows.length + ' rows \u00B7 ' + VALUE_COL + ' by ' + LABEL_COL;
        renderChart(rows);
      },
      error: (err) => showError(err.message || 'CSV fetch failed'),
    });

    function showError(msg) {
      document.getElementById('chart').innerHTML =
        '<div class="error">Error: ' + msg + '</div>';
    }

    function renderChart(rows) {
      const W = 760, H = 320, P = { top: 20, right: 10, bottom: 36, left: 50 };
      const innerW = W - P.left - P.right;
      const innerH = H - P.top - P.bottom;
      const max = Math.max(...rows.map(r => r[VALUE_COL]));
      const barW = innerW / rows.length * 0.7;
      const gap = innerW / rows.length * 0.3;

      let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
      // gridlines
      for (let i = 0; i <= 4; i++) {
        const y = P.top + (innerH * i / 4);
        const val = Math.round(max * (1 - i / 4));
        svg += '<line x1="' + P.left + '" y1="' + y + '" x2="' + (P.left + innerW) + '" y2="' + y + '" stroke="#eee"/>';
        svg += '<text class="axis" x="' + (P.left - 8) + '" y="' + (y + 4) + '" text-anchor="end">' + val.toLocaleString() + '</text>';
      }
      // bars + labels
      rows.forEach((r, i) => {
        const x = P.left + i * (barW + gap) + gap / 2;
        const h = (r[VALUE_COL] / max) * innerH;
        const y = P.top + innerH - h;
        svg += '<rect class="bar" x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="3"/>';
        svg += '<text class="value-label" x="' + (x + barW / 2) + '" y="' + (y - 6) + '" text-anchor="middle">' + r[VALUE_COL].toLocaleString() + '</text>';
        svg += '<text class="axis" x="' + (x + barW / 2) + '" y="' + (H - P.bottom + 18) + '" text-anchor="middle">' + r[LABEL_COL] + '</text>';
      });
      svg += '</svg>';
      document.getElementById('chart').innerHTML = svg;
    }
  <\/script>
</body>
</html>`,

const ta = document.getElementById('code');
const preview = document.getElementById('preview');
const tplSelect = document.getElementById('tpl');
const toast = document.getElementById('toast');

const PROD_BASE = 'https://powerbiferrytales.github.io';

function rewriteForPreview(value) {
  // Swap the production data URL for the current origin so previews work
  // on localhost, raw.githack (test branches), or github.io. Downloaded
  // HTML keeps the production URL so it works anywhere.
  const base = location.origin + location.pathname.replace(/\/[^/]*$/, '');
  if (base === PROD_BASE) return value;
  return value.split(PROD_BASE).join(base);
}

ta.value = TEMPLATES.stat;
preview.srcdoc = rewriteForPreview(TEMPLATES.stat);

let editor = null;
let renderTimer = null;

function render(value) {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    preview.srcdoc = rewriteForPreview(value);
  }, 250);
}

function currentValue() {
  return editor ? editor.getValue() : ta.value;
}

function setValue(v) {
  if (editor) {
    editor.setValue(v);
    editor.clearHistory();
  } else {
    ta.value = v;
  }
  render(v);
}

function loadTemplate(name) {
  setValue(TEMPLATES[name] || TEMPLATES.blank);
}

if (typeof CodeMirror !== 'undefined') {
  editor = CodeMirror.fromTextArea(ta, {
    mode: 'htmlmixed',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: true,
    autoCloseTags: true,
    matchBrackets: true,
    indentUnit: 2,
    tabSize: 2,
  });
  editor.on('change', () => render(editor.getValue()));
} else {
  ta.addEventListener('input', () => render(ta.value));
}

tplSelect.addEventListener('change', () => loadTemplate(tplSelect.value));
document.getElementById('reset').addEventListener('click', () => loadTemplate(tplSelect.value));

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

document.getElementById('copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(currentValue());
    showToast('Copied to clipboard');
  } catch {
    showToast('Copy failed — select + copy manually');
  }
});

document.getElementById('download').addEventListener('click', () => {
  const blob = new Blob([currentValue()], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `infographic-${tplSelect.value}.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded');
});

const divider = document.getElementById('divider');
const split = document.getElementById('split');
const leftPane = document.getElementById('editorPane');
let dragging = false;

divider.addEventListener('mousedown', () => {
  if (window.innerWidth <= 780) return;
  dragging = true;
  divider.classList.add('dragging');
  document.body.style.userSelect = 'none';
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = split.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  leftPane.style.flex = `0 0 ${Math.max(20, Math.min(80, pct))}%`;
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  divider.classList.remove('dragging');
  document.body.style.userSelect = '';
});

// ─── Properties panel ──────────────────────────────────────────────────────

const SCHEMAS = {
  blank: null,
  stat: {
    fields: [{ prop: 'dataUrl', label: 'Data URL', type: 'url' }],
  },
  kpis: {
    fields: [{ prop: 'dataUrl', label: 'Data URL', type: 'url' }],
  },
  chart: {
    fields: [
      { prop: 'title',    label: 'Chart title',   type: 'text' },
      { prop: 'dataUrl',  label: 'CSV URL',       type: 'url' },
      { prop: 'labelCol', label: 'Label column',  type: 'text' },
      { prop: 'valueCol', label: 'Value column',  type: 'text' },
      { prop: 'barColor', label: 'Bar colour',    type: 'color' },
    ],
  },
  quote: {
    fields: [
      { prop: 'quote',      label: 'Quote',         type: 'textarea' },
      { prop: 'attribName', label: 'Author',        type: 'text' },
      { prop: 'attribRole', label: 'Role / source', type: 'text' },
    ],
  },
  steps: {
    fields: [
      { prop: 'title', label: 'Title', type: 'text' },
      { prop: 'intro', label: 'Intro', type: 'textarea' },
    ],
    repeats: [{
      key: 'step',
      label: 'Steps',
      itemLabel: 'Step',
      fields: [
        { prop: 'heading', label: 'Heading', type: 'text' },
        { prop: 'body',    label: 'Body',    type: 'textarea' },
      ],
      itemTemplate: '<div class="step" data-repeat-item="step">\n'
        + '  <div class="num"></div>\n'
        + '  <div class="content">\n'
        + '    <h3 data-prop="heading">New step</h3>\n'
        + '    <p data-prop="body">Step description.</p>\n'
        + '  </div>\n'
        + '</div>',
    }],
  },
  compare: {
    fields: [
      { prop: 'title',    label: 'Title',    type: 'text' },
      { prop: 'subtitle', label: 'Subtitle', type: 'text' },
    ],
    repeats: [{
      key: 'col',
      label: 'Columns',
      itemLabel: 'Column',
      fields: [
        { prop: 'heading',  label: 'Heading',  type: 'text' },
        { prop: 'number',   label: 'Number',   type: 'text' },
        { prop: 'numLabel', label: 'Caption',  type: 'text' },
        { prop: 'bullets',  label: 'Bullets (one per line)', type: 'textarea', target: 'bullets' },
        { prop: 'winner',   label: 'Highlight', type: 'checkbox', target: 'class', className: 'winner' },
      ],
      itemTemplate: '<div class="col" data-repeat-item="col">\n'
        + '  <h2 data-prop="heading">New column</h2>\n'
        + '  <div class="num" data-prop="number">0</div>\n'
        + '  <div class="num-label" data-prop="numLabel">caption</div>\n'
        + '  <ul data-prop="bullets"><li>Point one</li></ul>\n'
        + '</div>',
    }],
  },
};

const panel = document.getElementById('panel');
const panelBody = document.getElementById('panelBody');

function detectTemplate(html) {
  const m = html.match(/<meta\s+data-template=["']([^"']+)["']/i);
  return m ? m[1] : null;
}

function readFrom(el, field) {
  if (el.tagName === 'META') return el.getAttribute('content') || '';
  if (field.target === 'bullets') {
    return [...el.querySelectorAll('li')].map(li => li.textContent).join('\n');
  }
  return el.textContent;
}

function writeTo(el, field, value) {
  if (el.tagName === 'META') { el.setAttribute('content', String(value)); return; }
  if (field.target === 'bullets') {
    const lines = String(value).split('\n').map(s => s.trim()).filter(Boolean);
    el.innerHTML = lines.map(l => '<li>' + escapeHtml(l) + '</li>').join('');
    return;
  }
  el.textContent = String(value);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function parsePanelValues(html, schema) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const values = {};
  for (const f of schema.fields || []) {
    const el = doc.querySelector('[data-prop="' + f.prop + '"]');
    if (el) values[f.prop] = readFrom(el, f);
  }
  values._repeats = {};
  for (const r of schema.repeats || []) {
    const container = doc.querySelector('[data-repeat-container="' + r.key + '"]');
    const items = container ? [...container.querySelectorAll('[data-repeat-item="' + r.key + '"]')] : [];
    values._repeats[r.key] = items.map(item => {
      const iv = {};
      for (const f of r.fields) {
        if (f.target === 'class') {
          iv[f.prop] = item.classList.contains(f.className);
        } else {
          const el = item.querySelector('[data-prop="' + f.prop + '"]');
          iv[f.prop] = el ? readFrom(el, f) : '';
        }
      }
      return iv;
    });
  }
  return values;
}

function applyFieldChange(html, schema, change) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const { field, value, repeatKey, repeatIdx } = change;
  let scope = doc;
  if (repeatKey != null) {
    const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
    const items = container ? [...container.querySelectorAll('[data-repeat-item="' + repeatKey + '"]')] : [];
    scope = items[repeatIdx];
    if (!scope) return html;
  }
  if (field.target === 'class') {
    scope.classList.toggle(field.className, !!value);
  } else {
    const el = scope.querySelector('[data-prop="' + field.prop + '"]');
    if (el) writeTo(el, field, value);
  }
  return serialize(doc);
}

function applyRepeatAdd(html, schema, repeatKey) {
  const r = (schema.repeats || []).find(x => x.key === repeatKey);
  if (!r) return html;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
  if (!container) return html;
  const tpl = document.createElement('template');
  tpl.innerHTML = r.itemTemplate.trim();
  container.appendChild(tpl.content.firstChild);
  return serialize(doc);
}

function applyRepeatRemove(html, schema, repeatKey, idx) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const container = doc.querySelector('[data-repeat-container="' + repeatKey + '"]');
  if (!container) return html;
  const items = [...container.querySelectorAll('[data-repeat-item="' + repeatKey + '"]')];
  if (items[idx]) items[idx].remove();
  return serialize(doc);
}

function serialize(doc) {
  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

function buildFieldInput(field, value, onInput) {
  const wrap = document.createElement('div');
  wrap.className = 'ig-field' + (field.type === 'checkbox' ? ' inline' : '');

  if (field.type === 'checkbox') {
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = !!value;
    input.addEventListener('change', () => onInput(input.checked));
    wrap.appendChild(input);
    const lbl = document.createElement('span');
    lbl.className = 'ig-field-label';
    lbl.textContent = field.label;
    wrap.appendChild(lbl);
    return wrap;
  }

  const lbl = document.createElement('label');
  lbl.className = 'ig-field-label';
  lbl.textContent = field.label;
  wrap.appendChild(lbl);

  let input;
  if (field.type === 'textarea') {
    input = document.createElement('textarea');
  } else {
    input = document.createElement('input');
    input.type = field.type === 'url' ? 'url' : (field.type === 'color' ? 'color' : (field.type === 'number' ? 'number' : 'text'));
  }
  input.value = value == null ? '' : String(value);
  input.addEventListener('input', () => onInput(input.value));
  wrap.appendChild(input);
  return wrap;
}

function renderPanel() {
  const html = currentValue();
  const tpl = detectTemplate(html);
  const schema = tpl && SCHEMAS[tpl];

  panelBody.innerHTML = '';

  if (!tpl) {
    const empty = document.createElement('div');
    empty.className = 'ig-empty';
    empty.textContent = 'Custom HTML — no properties available. Pick a template to enable the panel.';
    panelBody.appendChild(empty);
    return;
  }
  if (!schema) {
    const empty = document.createElement('div');
    empty.className = 'ig-empty';
    empty.textContent = 'This template has no editable properties.';
    panelBody.appendChild(empty);
    return;
  }

  const values = parsePanelValues(html, schema);

  for (const f of schema.fields || []) {
    panelBody.appendChild(buildFieldInput(f, values[f.prop], (v) => {
      applyFromPanel(applyFieldChange(currentValue(), schema, { field: f, value: v }));
    }));
  }

  for (const r of schema.repeats || []) {
    const rWrap = document.createElement('div');
    rWrap.className = 'ig-repeat';
    const rLbl = document.createElement('div');
    rLbl.className = 'ig-repeat-label';
    rLbl.textContent = r.label;
    rWrap.appendChild(rLbl);

    const items = values._repeats[r.key] || [];
    items.forEach((iv, idx) => {
      const item = document.createElement('div');
      item.className = 'ig-repeat-item';
      const itemTitle = document.createElement('div');
      itemTitle.className = 'ig-repeat-item-title';
      itemTitle.textContent = r.itemLabel + ' ' + (idx + 1);
      item.appendChild(itemTitle);

      if (items.length > 1) {
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.className = 'ig-repeat-remove';
        rm.innerHTML = '&times;';
        rm.title = 'Remove ' + r.itemLabel.toLowerCase();
        rm.addEventListener('click', () => {
          applyFromPanel(applyRepeatRemove(currentValue(), schema, r.key, idx), { rebuild: true });
        });
        item.appendChild(rm);
      }

      for (const f of r.fields) {
        item.appendChild(buildFieldInput(f, iv[f.prop], (v) => {
          applyFromPanel(applyFieldChange(currentValue(), schema, {
            field: f, value: v, repeatKey: r.key, repeatIdx: idx,
          }));
        }));
      }
      rWrap.appendChild(item);
    });

    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'ig-repeat-add';
    addBtn.textContent = '+ Add ' + r.itemLabel.toLowerCase();
    addBtn.addEventListener('click', () => {
      applyFromPanel(applyRepeatAdd(currentValue(), schema, r.key), { rebuild: true });
    });
    rWrap.appendChild(addBtn);

    panelBody.appendChild(rWrap);
  }
}

let applyingFromPanel = false;

function applyFromPanel(newHtml, opts) {
  applyingFromPanel = true;
  try {
    setValue(newHtml);
    // Only rebuild the panel for structural changes (add/remove rows).
    // Field edits leave focus on the input the user is typing in.
    if (opts && opts.rebuild) renderPanel();
  } finally {
    applyingFromPanel = false;
  }
}

function onEditorContentChanged() {
  if (applyingFromPanel) return;
  renderPanel();
}

// Hook into editor changes (CodeMirror or textarea fallback)
if (editor) {
  editor.on('change', onEditorContentChanged);
} else {
  ta.addEventListener('input', onEditorContentChanged);
}
tplSelect.addEventListener('change', () => {
  // loadTemplate already fired; re-render panel after the fact
  setTimeout(renderPanel, 0);
});

// Collapsible toggle
document.getElementById('togglePanel').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
});

// Initial render
renderPanel();
</script>

</body>
