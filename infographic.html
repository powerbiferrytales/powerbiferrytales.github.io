<body>
  <h1 id="title">Loading&hellip;</h1>
  <div class="sub" id="subtitle"></div>
  <div class="grid" id="grid"></div>
  <script>
    // Swap this URL for your own JSON file.
    // Shape: { title, subtitle, items: [{ label, value, delta, accent, deltaSuffix? }] }
    const DATA_URL = 'https://powerbiferrytales.github.io/data/kpis.json';
    fetch(DATA_URL)
      .then(r => r.json())
      .then(d => {
        document.getElementById('title').textContent = d.title;
        document.getElementById('subtitle').textContent = d.subtitle;
        const grid = document.getElementById('grid');
        grid.innerHTML = d.items.map(it => {
          const down = it.delta < 0;
          const arrow = down ? '\u25BC' : '\u25B2';
          const suffix = it.deltaSuffix || '%';
          return '<div class="kpi" style="--accent:' + it.accent + '">'
            + '<div class="kpi-label">' + it.label + '</div>'
            + '<div class="kpi-value">' + it.value + '</div>'
            + '<div class="kpi-delta' + (down ? ' down' : '') + '">'
              + arrow + ' ' + Math.abs(it.delta) + suffix
            + '</div>'
          + '</div>';
        }).join('');
      })

        document.getElementById('title').textContent = 'Error';

  chart: `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar chart</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"><\/script>
<style>
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #fff;
    margin: 0;
    padding: 48px 40px;
    color: #1e2060;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 1.9rem; margin: 0 0 6px; }
  .sub { color: #7e7e92; margin-bottom: 32px; }
  svg { width: 100%; height: auto; display: block; }
  .bar { fill: #c9185b; transition: fill 0.2s; }
  .bar:hover { fill: #dd2a6d; }
  .axis text { font-size: 12px; fill: #7e7e92; }
  .value-label { font-size: 11px; fill: #1e2060; font-weight: 600; }
  .error { color: #991b1b; background: #fee2e2; padding: 12px; border-radius: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Monthly revenue</h1>
    <div class="sub">Loading CSV&hellip;</div>
    <div id="chart"></div>
  </div>
  <script>
    // Swap this URL for your own CSV. Expected columns: label, value
    const DATA_URL = 'https://powerbiferrytales.github.io/data/sales.csv';
    const VALUE_COL = 'revenue';
    const LABEL_COL = 'month';

    Papa.parse(DATA_URL, {
      download: true,
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true,
      complete: (res) => {
        const rows = res.data.filter(r => r[LABEL_COL] != null && r[VALUE_COL] != null);
        if (!rows.length) { showError('No data rows found'); return; }
        document.querySelector('.sub').textContent =
          rows.length + ' rows \u00B7 ' + VALUE_COL + ' by ' + LABEL_COL;
        renderChart(rows);
      },
      error: (err) => showError(err.message || 'CSV fetch failed'),
    });

    function showError(msg) {
      document.getElementById('chart').innerHTML =
        '<div class="error">Error: ' + msg + '</div>';
    }

    function renderChart(rows) {
      const W = 760, H = 320, P = { top: 20, right: 10, bottom: 36, left: 50 };
      const innerW = W - P.left - P.right;
      const innerH = H - P.top - P.bottom;
      const max = Math.max(...rows.map(r => r[VALUE_COL]));
      const barW = innerW / rows.length * 0.7;
      const gap = innerW / rows.length * 0.3;

      let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
      // gridlines
      for (let i = 0; i <= 4; i++) {
        const y = P.top + (innerH * i / 4);
        const val = Math.round(max * (1 - i / 4));
        svg += '<line x1="' + P.left + '" y1="' + y + '" x2="' + (P.left + innerW) + '" y2="' + y + '" stroke="#eee"/>';
        svg += '<text class="axis" x="' + (P.left - 8) + '" y="' + (y + 4) + '" text-anchor="end">' + val.toLocaleString() + '</text>';
      }
      // bars + labels
      rows.forEach((r, i) => {
        const x = P.left + i * (barW + gap) + gap / 2;
        const h = (r[VALUE_COL] / max) * innerH;
        const y = P.top + innerH - h;
        svg += '<rect class="bar" x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="3"/>';
        svg += '<text class="value-label" x="' + (x + barW / 2) + '" y="' + (y - 6) + '" text-anchor="middle">' + r[VALUE_COL].toLocaleString() + '</text>';
        svg += '<text class="axis" x="' + (x + barW / 2) + '" y="' + (H - P.bottom + 18) + '" text-anchor="middle">' + r[LABEL_COL] + '</text>';
      });
      svg += '</svg>';
      document.getElementById('chart').innerHTML = svg;
    }
  <\/script>
</body>
</html>`,

      <div class="num-label">minutes to find a number</div>
      <ul>
        <li>Live Power BI service</li>
        <li>Always up to date</li>
        <li>Full drill-through</li>
        <li>Mobile-ready</li>
      </ul>
    </div>
  </div>
</body>
</html>`,
};

const ta = document.getElementById('code');
const preview = document.getElementById('preview');
const tplSelect = document.getElementById('tpl');
const toast = document.getElementById('toast');

const PROD_BASE = 'https://powerbiferrytales.github.io';

function rewriteForPreview(value) {
  // Swap the production data URL for the current origin so previews work
  // on localhost, raw.githack (test branches), or github.io. Downloaded
  // HTML keeps the production URL so it works anywhere.
  const base = location.origin + location.pathname.replace(/\/[^/]*$/, '');
  if (base === PROD_BASE) return value;
  return value.split(PROD_BASE).join(base);
}

ta.value = TEMPLATES.stat;
preview.srcdoc = rewriteForPreview(TEMPLATES.stat);

let editor = null;
let renderTimer = null;

function render(value) {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    preview.srcdoc = rewriteForPreview(value);
  }, 250);
}

function currentValue() {
  return editor ? editor.getValue() : ta.value;
}

function setValue(v) {
  if (editor) {
    editor.setValue(v);
    editor.clearHistory();
  } else {
    ta.value = v;
  }
  render(v);
}

function loadTemplate(name) {
  setValue(TEMPLATES[name] || TEMPLATES.blank);
}

if (typeof CodeMirror !== 'undefined') {
  editor = CodeMirror.fromTextArea(ta, {
    mode: 'htmlmixed',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: true,
    autoCloseTags: true,
    matchBrackets: true,
    indentUnit: 2,
    tabSize: 2,
  });
  editor.on('change', () => render(editor.getValue()));
} else {
  ta.addEventListener('input', () => render(ta.value));
}

tplSelect.addEventListener('change', () => loadTemplate(tplSelect.value));
document.getElementById('reset').addEventListener('click', () => loadTemplate(tplSelect.value));

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

document.getElementById('copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(currentValue());
    showToast('Copied to clipboard');
  } catch {
    showToast('Copy failed — select + copy manually');
  }
});

document.getElementById('download').addEventListener('click', () => {
  const blob = new Blob([currentValue()], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `infographic-${tplSelect.value}.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded');
});

const divider = document.getElementById('divider');
const split = document.getElementById('split');
const leftPane = document.getElementById('editorPane');
let dragging = false;

divider.addEventListener('mousedown', () => {
  if (window.innerWidth <= 780) return;
  dragging = true;
  divider.classList.add('dragging');
  document.body.style.userSelect = 'none';
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = split.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  leftPane.style.flex = `0 0 ${Math.max(20, Math.min(80, pct))}%`;
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  divider.classList.remove('dragging');
  document.body.style.userSelect = '';
});
</script>

</body>
</html>
